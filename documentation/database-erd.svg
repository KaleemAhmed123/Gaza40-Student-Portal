<svg xmlns="http://www.w3.org/2000/svg" width="1550" height="1160" viewBox="0 0 1550 1160">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .group { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 14; }
      .box { fill: #ffffff; stroke: #0f766e; stroke-width: 1.5; rx: 8; }
      .title { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .note { font: 400 12px Arial, sans-serif; fill: #64748b; }
      .entity { font: 700 15px Arial, sans-serif; fill: #0f172a; }
      .field { font: 400 11.5px Arial, sans-serif; fill: #334155; }
      .label { font: 600 11px Arial, sans-serif; fill: #475569; }
      .line { stroke: #475569; stroke-width: 1.35; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#475569"/>
    </marker>
  </defs>

  <rect class="bg" width="1550" height="1160"/>
  <text x="40" y="42" class="title">Gaza40+ Database ERD, Simplified Target Schema</text>
  <text x="40" y="64" class="note">Grouped by business area. Region stays as configurable master data because it owns relationships and access rules.</text>

  <rect x="40" y="95" width="430" height="330" class="group"/>
  <text x="65" y="130" class="title">Identity</text>
  <text x="65" y="150" class="note">One login table. Roles are stored directly as a fixed enum array.</text>
  <rect x="80" y="185" width="330" height="190" class="box"/>
  <text x="100" y="215" class="entity">User</text>
  <text x="100" y="243" class="field">id, email, passwordHash</text>
  <text x="100" y="263" class="field">fullName, phone, dateOfBirth</text>
  <text x="100" y="283" class="field">roles: RoleCode[]</text>
  <text x="100" y="303" class="field">accountStatus</text>
  <text x="100" y="323" class="field">emailVerifiedAt, lastLoginAt</text>
  <text x="100" y="343" class="field">createdAt, updatedAt, deletedAt</text>

  <rect x="525" y="95" width="485" height="330" class="group"/>
  <text x="550" y="130" class="title">Profiles</text>
  <text x="550" y="150" class="note">Role-specific profile data. Regional admin has exactly one region.</text>
  <rect x="555" y="185" width="190" height="185" class="box"/>
  <text x="575" y="215" class="entity">StudentProfile</text>
  <text x="575" y="243" class="field">userId unique</text>
  <text x="575" y="263" class="field">Gaza location</text>
  <text x="575" y="283" class="field">passport fields</text>
  <text x="575" y="303" class="field">English/MOI fields</text>
  <text x="575" y="323" class="field">consentSigned</text>
  <text x="575" y="343" class="field">profileStatus</text>
  <rect x="770" y="185" width="200" height="110" class="box"/>
  <text x="790" y="215" class="entity">VolunteerProfile</text>
  <text x="790" y="243" class="field">userId unique</text>
  <text x="790" y="263" class="field">affiliation, status</text>
  <rect x="770" y="315" width="200" height="90" class="box"/>
  <text x="790" y="345" class="entity">RegionalAdminProfile</text>
  <text x="790" y="373" class="field">userId unique</text>
  <text x="790" y="393" class="field">regionId, status</text>

  <path class="line" d="M410 245 C475 230 500 230 555 245"/>
  <text x="460" y="225" class="label">1:1</text>
  <path class="line" d="M410 285 C535 285 640 240 770 240"/>
  <text x="575" y="270" class="label">1:1</text>
  <path class="line" d="M410 325 C535 360 645 360 770 360"/>
  <text x="575" y="350" class="label">1:1</text>

  <rect x="1060" y="95" width="440" height="330" class="group"/>
  <text x="1085" y="130" class="title">Region And Master Data</text>
  <text x="1085" y="150" class="note">Admin-configurable values that own relationships.</text>
  <rect x="1095" y="185" width="170" height="110" class="box"/>
  <text x="1115" y="215" class="entity">Region</text>
  <text x="1115" y="243" class="field">code, name</text>
  <text x="1115" y="263" class="field">isActive</text>
  <rect x="1310" y="185" width="160" height="120" class="box"/>
  <text x="1330" y="215" class="entity">University</text>
  <text x="1330" y="243" class="field">regionId</text>
  <text x="1330" y="263" class="field">name, city</text>
  <text x="1330" y="283" class="field">isLondon</text>
  <rect x="1095" y="325" width="170" height="75" class="box"/>
  <text x="1115" y="355" class="entity">ConfigOption</text>
  <text x="1115" y="383" class="field">groupKey, value, labels</text>
  <rect x="1310" y="335" width="160" height="65" class="box"/>
  <text x="1330" y="365" class="entity">AppConfig</text>
  <text x="1330" y="393" class="field">key, value JSON</text>

  <path class="line" d="M1265 240 L1310 240"/>
  <text x="1275" y="230" class="label">1:M</text>
  <path class="line" d="M970 370 C1015 360 1050 310 1095 265"/>
  <text x="1015" y="348" class="label">M:1</text>

  <rect x="40" y="475" width="760" height="335" class="group"/>
  <text x="65" y="510" class="title">Offers And Files</text>
  <text x="65" y="530" class="note">Offers belong directly to student User; profile stays separate.</text>
  <rect x="75" y="570" width="245" height="185" class="box"/>
  <text x="95" y="600" class="entity">Offer</text>
  <text x="95" y="628" class="field">studentUserId</text>
  <text x="95" y="648" class="field">regionId, universityId?</text>
  <text x="95" y="668" class="field">universityName fallback</text>
  <text x="95" y="688" class="field">course/funding fields</text>
  <text x="95" y="708" class="field">reviewStatus</text>
  <text x="95" y="728" class="field">lockedForReview</text>
  <rect x="370" y="570" width="190" height="170" class="box"/>
  <text x="390" y="600" class="entity">Document</text>
  <text x="390" y="628" class="field">ownerUserId</text>
  <text x="390" y="648" class="field">studentProfileId?</text>
  <text x="390" y="668" class="field">offerId?</text>
  <text x="390" y="688" class="field">documentType</text>
  <text x="390" y="708" class="field">storageKey, status</text>
  <rect x="605" y="590" width="160" height="125" class="box"/>
  <text x="625" y="620" class="entity">OfferRevision</text>
  <text x="625" y="648" class="field">offerId</text>
  <text x="625" y="668" class="field">editedBy User</text>
  <text x="625" y="688" class="field">before/after JSON</text>

  <path class="line" d="M230 375 C230 440 215 500 200 570"/>
  <text x="238" y="470" class="label">User 1:M Offer</text>
  <path class="line" d="M320 660 L370 660"/>
  <text x="333" y="650" class="label">1:M</text>
  <path class="line" d="M320 635 C450 560 540 590 605 635"/>
  <text x="455" y="600" class="label">1:M</text>
  <path class="line" d="M1265 250 C1040 455 610 500 320 630"/>
  <text x="850" y="450" class="label">Region 1:M Offer</text>
  <path class="line" d="M1310 275 C1010 500 600 520 320 650"/>
  <text x="930" y="525" class="label">University 1:M Offer</text>

  <rect x="850" y="475" width="650" height="335" class="group"/>
  <text x="875" y="510" class="title">Alerts And Announcements</text>
  <text x="875" y="530" class="note">Simple tickets first: direct assignment fields, not separate assignment tables.</text>
  <rect x="885" y="575" width="220" height="165" class="box"/>
  <text x="905" y="605" class="entity">Alert</text>
  <text x="905" y="633" class="field">studentUserId</text>
  <text x="905" y="653" class="field">offerId?, regionId?</text>
  <text x="905" y="673" class="field">alertType, status</text>
  <text x="905" y="693" class="field">assignedToUserId?</text>
  <text x="905" y="713" class="field">assignedByUserId?</text>
  <rect x="1145" y="585" width="170" height="125" class="box"/>
  <text x="1165" y="615" class="entity">AlertMessage</text>
  <text x="1165" y="643" class="field">alertId</text>
  <text x="1165" y="663" class="field">senderUserId</text>
  <text x="1165" y="683" class="field">message</text>
  <rect x="1345" y="585" width="125" height="125" class="box"/>
  <text x="1365" y="615" class="entity">Announcement</text>
  <text x="1365" y="643" class="field">createdByUserId</text>
  <text x="1365" y="663" class="field">title, body</text>
  <text x="1365" y="683" class="field">category</text>

  <path class="line" d="M1105 655 L1145 655"/>
  <text x="1114" y="645" class="label">1:M</text>
  <path class="line" d="M320 700 C550 770 730 715 885 670"/>
  <text x="600" y="760" class="label">Offer 1:M Alert</text>
  <path class="line" d="M410 310 C640 440 730 570 885 625"/>
  <text x="610" y="508" class="label">User 1:M Alert</text>
  <path class="line" d="M410 215 C735 320 1110 430 1345 625"/>
  <text x="1000" y="438" class="label">User creates announcements</text>

  <rect x="40" y="860" width="1460" height="230" class="group"/>
  <text x="65" y="895" class="title">Audit Trail</text>
  <text x="65" y="915" class="note">One generic audit table covers profile, offer, alert, admin, and file actions.</text>
  <rect x="95" y="955" width="245" height="105" class="box"/>
  <text x="115" y="985" class="entity">AuditLog</text>
  <text x="115" y="1013" class="field">actorUserId?</text>
  <text x="115" y="1033" class="field">action, entityType, entityId</text>
  <text x="115" y="1053" class="field">metadata, ipAddress, userAgent</text>
  <path class="line" d="M200 375 C100 545 80 770 145 955"/>
  <text x="105" y="760" class="label">User 1:M AuditLog</text>
</svg>
